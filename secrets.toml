# ─────────────────────────────────────────────────────────────
# .streamlit/secrets.toml — CONTOH KONFIGURASI
# ─────────────────────────────────────────────────────────────
# PENTING:
# 1. File ini JANGAN di-commit ke GitHub (tambahkan ke .gitignore)
# 2. Di Streamlit Cloud: salin isi ini ke Settings → Secrets
# 3. Ganti semua nilai placeholder (xxx...) dengan data asli Anda
# ─────────────────────────────────────────────────────────────

# ── Google Sheets ─────────────────────────────
[google_sheets]
# Ambil dari URL sheet: https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/edit
spreadsheet_id = "GANTI_DENGAN_ID_SPREADSHEET_ANDA"

# Nama tab/sheet di dalam spreadsheet (default: "Data Peserta")
sheet_name     = "Data Peserta"


# ── Google Drive ──────────────────────────────
[google_drive]
# ID folder Google Drive tempat TTD akan diupload
# Ambil dari URL folder: https://drive.google.com/drive/folders/FOLDER_ID
folder_id = "GANTI_DENGAN_ID_FOLDER_DRIVE_ANDA"


# ── Service Account (Google Cloud) ───────────
# Salin isi file service-account-key.json ke sini
[gcp_service_account]
type                        = "service_account"
project_id                  = "nama-project-google-cloud-anda"
private_key_id              = "abc123def456..."
private_key                 = "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA...\n-----END RSA PRIVATE KEY-----\n"
client_email                = "nama-service-account@nama-project.iam.gserviceaccount.com"
client_id                   = "123456789012345678901"
auth_uri                    = "https://accounts.google.com/o/oauth2/auth"
token_uri                   = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url        = "https://www.googleapis.com/robot/v1/metadata/x509/nama-service-account%40nama-project.iam.gserviceaccount.com"
universe_domain             = "googleapis.com"
